tools:
  - name: execute_shell_command
    desc: 执行 shell 命令（支持本地脚本/容器），用于测试
  - name: read_file
    desc: 读取脚本内容（用于提取 shebang 和功能分析）
  - name: get_current_time
    desc: 获取当前时间，记录路径解析和执行时间
  - name: write_file
    desc: 生成路径测试报告（含脚本类型、shebang、权限信息）
  - name: memory_search
    desc: 检索过往路径测试记录，避免重复错误
