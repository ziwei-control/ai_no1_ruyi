name: Mirror to Gitee

on:
  push:
    branches: [ master, main ]
  repository_dispatch:
    types: [mirror-request]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_REPO_URL: "https://pandac0:${GITEE_TOKEN}@gitee.com/pandac0/ai_no1_ruyi.git"
        run: |
          git config --global user.name "Spanda"
          git config --global user.email "spanda@copaw.local"
          git remote add gitee "${GITEE_REPO_URL}" || git remote set-url gitee "${GITEE_REPO_URL}"
          git push gitee --all --force
          git push gitee --tags --force
          echo "✅ Mirror completed to Gitee: https://gitee.com/pandac0/ai_no1_ruyi"
